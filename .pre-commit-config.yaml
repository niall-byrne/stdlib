---
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0
    hooks:
      - id: yamllint
        args:
          - "-c"
          - "./.yamllint.yml"
        stages: [pre-commit]
  - repo: https://github.com/cicd-tools-org/pre-commit.git
    rev: 0.6.0
    hooks:
      - id: format-shell
        args:
          - "-w"
          - "--indent=2"
          - "-ci"
          - "-sr"
        files: "^.+\\.(sh|snippet)$"
        exclude: "^dist/stdlib(_testing)*.sh$"
      - id: format-toml
      - id: git-conflict-markers
        exclude: "^src/logger/tests/test_stdlib_logger_traceback.sh$"
      - id: lint-github-workflow
      - id: lint-github-workflow-header
      - id: lint-markdown
        args:
          - "-c"
          - ".markdownlint.yml"
      - id: lint-shell
        args:
          - "--color=always"
          - "--source-path=SCRIPTDIR"
          - "--exclude=SC2317"
          - "-x"
        files: "^.+\\.(sh|snippet)$"
        exclude: "^dist/stdlib(_testing)*.sh$"
      - id: pre-commit-sort-config
      - id: security-credentials
      - id: spelling-commit-message
      - id: spelling-markdown
      - id: spelling-vale-sync
      - id: spelling-vale-vocab
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.2.2
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.22.0
    hooks:
      - id: check-jsonschema
        name: check-github-workflow-push-schema
        files: "^\\.github/config/workflows/workflow-push.json$"
        args:
          - "--schemafile"
          - ".github/config/schemas/workflows/workflow-push.json"
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: bash-code-coverage
        name: ensure the codebase meets coverage requirements
        entry: bash -c 'TEST_RUNNER=build/test.sh TEST_CONTAINER_DISABLE_TTY=1 ./container.sh run collect_coverage src'
        language: system
        stages: [manual]
        pass_filenames: false
        require_serial: true
      - id: bash-unit-tests
        name: ensure unit tests pass
        entry: bash -c 'TEST_CONTAINER_DISABLE_TTY=1 ./container.sh run build/test.sh src'
        language: system
        stages: [manual]
        pass_filenames: false
        require_serial: true
      - id: snippet-files-headers
        name: ensure snippet files have correct headers
        entry: "\\A(?!#!/bin/bash\n).+\\Z"
        args: [--multiline]
        language: pygrep
        files: "^src/.+\\.snippet$"
      - id: source-files-binaries
        name: ensure source files don't directly reference restricted binary commands
        entry: pre-commit/filtered_pygrep.py
        args:
          - "^\\s*#.*$"
          - "^(?!.*\\# noqa).*((?<=\\s|\\()|(?<=^))(cat|cut|grep|head|mktemp|rm|sed|sort|tail|tput|tr)((\\s|\\)).*$|$)"
        language: python
        files: "^src/.+\\.sh$"
        exclude: "^((.+/)*tests/.+\\.sh)$"
      - id: source-files-headers
        name: ensure source files have correct headers
        entry: "\\A(?!#!/bin/bash\n(# shellcheck disable=.+\n){0,1}\n# stdlib.+\nbuiltin set -eo pipefail\n).+\\Z"
        args: [--multiline]
        language: pygrep
        files: "^src/.+\\.sh$"
        exclude: "^((.+/)*tests/.+\\.sh|src/trap/trap.sh)$"
      - id: source-files-headers-(exporting-traps)
        name: ensure source files exporting traps have correct headers
        entry: "\\A(?!#!/bin/bash\n(# shellcheck disable=.+\n){0,1}\n# stdlib.+\nbuiltin set -Eeo pipefail\n).+\\Z"
        args: [--multiline]
        language: pygrep
        files: "^src/trap/trap.sh$"
      - id: source-files-keywords
        name: ensure source files use builtins prefaced with the 'builtin' command
        entry: pre-commit/filtered_pygrep.py
        args:
          - "^\\s*#.*$"
          - "^(?!.*\\# noqa).*(?<!builtin )(?<!stdlib\\.builtin\\.overridable )((?<=\\s|\\()|(?<=^))(break|continue|command|declare|echo|eval|false|printf|true|unset)((\\s|\\)).*$|$)"
        language: python
        files: "^src/.+\\.sh$"
        exclude: "^((.+/)*tests/.+\\.sh)$"
      - id: test-files-binaries
        name: ensure test files don't directly reference restricted binary commands
        entry: pre-commit/filtered_pygrep.py
        args:
          - "^\\s*#.*$"
          - "^(?!.*# noqa).*((?<=\\s|\\()|(?<=^))(cat|cut|grep|head|mktemp|rm|sed|sort|tail|tput|tr)((\\s|\\)).*$|$)"
        language: python
        files: "^((.+/)*tests/.+\\.sh)$"
        exclude: "^.*/test_.+\\.sh$"
      - id: test-files-headers
        name: ensure test files have correct headers
        entry: "\\A(?!#!/bin/bash\n).+\\Z"
        args: [--multiline]
        language: pygrep
        files: "^((.+/)*tests/.+\\.sh)$"
      - id: test-files-imports
        name: ensure test files do not use the source keyword for imports
        entry: "\\A#!/bin/bash\n.+((^ *|^ +|; *|\\| *|\\& *)(source |\\. )(\".+?\"|\\S+) *(;*)$)+.+\\Z"
        args: [--multiline]
        language: pygrep
        files: "^((.+/)*tests/.+\\.sh)$"
      - id: test-files-keywords
        name: ensure test fixtures use builtins prefaced with the 'builtin' command
        entry: pre-commit/filtered_pygrep.py
        args:
          - "^\\s*#.*$"
          - "^(?!.*# noqa).*(?<!builtin )(?<!stdlib\\.builtin\\.overridable )((?<=\\s|\\()|(?<=^))(break|continue|command|declare|echo|eval|false|printf|true|unset)((\\s|\\)).*$|$)"
        language: python
        files: "^src/.+\\.sh$"
        exclude: "^.*/test_.+\\.sh$"
